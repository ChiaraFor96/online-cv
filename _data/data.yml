skills:
  title: Skills
  toolset:
    - name: Soft skills
      info: Problem Solving, Communication & Synthesis, Active Listening, Team Collaboration, Technical Leadership, Coaching, Sense of Responsibility. Good comprehension of problems, mediation skills, coordination of human resources and good team-leading.

    - name: Professional skills
      info: |
        - __Big Data & Distributed Systems__:
          - __Distributed filesystems__: HDFS.
          - __Distributed databases__: MongoDB, Cassandra, HBase.
          - __Distributed execution frameworks__: Spark, Databricks.
          - __Ecosystem Management__: Cloudera CDP/CDH.
          - __System orchestration and administration__: Oozie, Hue, Airflow.
          - __Cloud platforms__: AWS, Azure.
          - __Virtualization and containerization__: Docker, Kubernetes.
        - __Microservices & Platform Engineering__:
          - __Architecture__: Microservices design, API Gateway, event-driven architecture.
          - __Messaging & streaming__: Kafka, RabbitMQ, REST, gRPC.
          - __Platform__: Witboost (Agile Lab), data mesh platform development.
        - __Business Intelligence & Data Analytics__:
          - __Visualization tools__: Tableau, Power BI, Matplotlib, Seaborn.
          - __Data mining__: scikit-learn, MLlib, Weka.
        - __Database Management Systems__:
          - __Relational__: Oracle, PostgreSQL.
          - __NoSQL__: MongoDB, Cassandra, HBase, Redis, Neo4J.
          - __GIS__: PostGIS, GeoSpark, QGIS, Geoserver.
        - __Computer Programming__:
          - __Languages__: Java, Scala, Python, Kotlin, SQL, PLSQL.
          - __Software engineering__: Git, Gradle, SBT, Maven, TravisCI.
        - __Web Development__:
          - __Web servers__: Apache Tomcat, NGINX.
          - __Languages & frameworks__: JavaScript, Node.js, Vue, PHP, CSS, HTML.
        - __Operating Systems__: Windows, Linux, macOS.
    - name: Driving license
        info: B.

