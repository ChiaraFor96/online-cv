career-profile:
    title: Career Profile
    summary: |
      Data Engineer with a PhD in data management and analysis in Big Data ecosystems, 
      currently working at Agile Lab. Passionate about innovative data solutions, 
      with a strong academic background and hands-on experience in Big Data technologies, data platforms, and Data Mesh architectures.  
      
      __Fields of interest__: Data Engineering, Data Platform Engineering, Data Analytics, Business Intelligence. 

